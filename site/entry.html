<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Entry — The Token Ledger</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <p><a href="./">← The Token Ledger</a> &nbsp;·&nbsp; <a href="archive_index.html">Archive</a></p>
  <article class="entry" id="content">Loading…</article>
  <hr>
  <p><a href="./#signup">Subscribe to the daily email →</a></p>
</main>
<script>
(async function () {
  const params = new URLSearchParams(location.search);
  const d = (params.get('d') || '').replace(/[^0-9-]/g, '');
  const el = document.getElementById('content');
  if (!/^\d{4}-\d{2}-\d{2}$/.test(d)) { el.textContent = 'Pick an entry from the archive.'; return; }
  try {
    const r = await fetch('../archive/' + d + '.md');
    if (!r.ok) throw new Error(r.status);
    let md = await r.text();
    md = md.replace(/^---[\s\S]*?---\s*/, '');
    el.innerHTML = renderMarkdown(md);
    document.title = (md.match(/^# (.+)$/m)?.[1] || 'Entry') + ' — The Token Ledger';
  } catch (e) { el.textContent = 'Entry not found.'; }
})();

function renderMarkdown(md) {
  const esc = s => s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c]);
  const lines = md.split('\n'); let out = []; let inList = false;
  for (let i = 0; i < lines.length; i++) {
    let l = lines[i];
    if (/^#{1,3} /.test(l)) {
      if (inList) { out.push('</ul>'); inList = false; }
      const lvl = l.match(/^#+/)[0].length;
      out.push(`<h${lvl}>${inline(esc(l.replace(/^#+\s*/, '')))}</h${lvl}>`);
    } else if (/^[-*] /.test(l)) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + inline(esc(l.replace(/^[-*]\s*/, ''))) + '</li>');
    } else if (l.trim() === '') {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push('');
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push('<p>' + inline(esc(l)) + '</p>');
    }
  }
  if (inList) out.push('</ul>');
  return out.join('\n');
  function inline(s) {
    return s
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>');
  }
}
</script>
</body>
</html>
